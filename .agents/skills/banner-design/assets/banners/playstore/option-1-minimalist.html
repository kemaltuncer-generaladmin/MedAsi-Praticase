<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PratiCase - Google Play Feature Graphic</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1024px;
            height: 500px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0;
            overflow: hidden;
        }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 40px 60px;
            position: relative;
        }
        .left {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .logo {
            width: 60px;
            height: 60px;
            background: #1B4D7A;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 32px;
            box-shadow: 0 4px 12px rgba(27, 77, 122, 0.2);
        }
        h1 {
            font-size: 48px;
            color: #1B2E4D;
            font-weight: 700;
            line-height: 1.2;
            margin: 0;
        }
        .highlight {
            color: #34B5A6;
        }
        p {
            font-size: 18px;
            color: #5a6c7d;
            line-height: 1.4;
            max-width: 400px;
        }
        .features {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #34B5A6;
            font-weight: 600;
        }
        .feature-item::before {
            content: "✓";
            font-weight: bold;
            font-size: 16px;
        }
        .cta {
            display: inline-block;
            background: linear-gradient(135deg, #34B5A6 0%, #2a9b8c 100%);
            color: white;
            padding: 12px 28px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            margin-top: 10px;
            box-shadow: 0 6px 20px rgba(52, 181, 166, 0.3);
            border: none;
            cursor: pointer;
        }
        .right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .circle-accent {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: linear-gradient(135deg, #34B5A6 0%, #F59E42 100%);
            opacity: 0.1;
            position: absolute;
        }
        .image-placeholder {
            width: 250px;
            height: 250px;
            background: white;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            box-shadow: 0 12px 40px rgba(27, 77, 122, 0.15);
            font-size: 120px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="logo">P</div>
            <h1>Practice<br><span class="highlight">Real Cases</span></h1>
            <p>Master OSCE scenarios with realistic clinical cases and expert feedback</p>
            <div class="features">
                <div class="feature-item">Realistic Cases</div>
                <div class="feature-item">Expert Feedback</div>
            </div>
            <button class="cta">Download Now</button>
        </div>
        <div class="right">
            <div class="circle-accent"></div>
            <div class="image-placeholder">👨‍⚕️</div>
        </div>
    </div>
</body>
</html>
