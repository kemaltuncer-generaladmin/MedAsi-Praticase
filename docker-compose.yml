services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - praticase_env
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3

secrets:
  praticase_env:
    file: ./.env.praticase
