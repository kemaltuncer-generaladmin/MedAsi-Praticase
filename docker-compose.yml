services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SUPABASE_URL: ${SUPABASE_URL:-https://qlinik.medasi.com.tr}
        FLUTTER_SUPABASE_URL: ${FLUTTER_SUPABASE_URL:-https://qlinik.medasi.com.tr}
        SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
        AUTH_REDIRECT_URL: ${AUTH_REDIRECT_URL:-https://praticase.medasi.com.tr/auth/callback}
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
