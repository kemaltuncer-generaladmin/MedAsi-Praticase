appId: com.medasi.praticase
name: 100 exhaustive QA - every button every screen
tags:
  - qa
env:
  USERNAME: ${MAESTRO_USERNAME}
  PASSWORD: ${MAESTRO_PASSWORD}
---
# ========== PHASE 1: LOGIN ==========
- launchApp:
    clearState: true
    stopApp: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: artifacts/qa_01_onboarding

- tapOn: "Giriş Yap"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: artifacts/qa_02_login

- tapOn:
    text: "doktor@hastane.com"
- inputText: ${USERNAME}
- hideKeyboard
- tapOn:
    text: "••••••••"
- inputText: ${PASSWORD}
- hideKeyboard
- tapOn:
    id: "cta.login-submit"
- runFlow:
    when:
      visible:
        id: "cta.complete-profile"
    commands:
      - scrollUntilVisible:
          element:
            id: "cta.complete-profile"
          direction: DOWN
      - tapOn:
          id: "cta.complete-profile"
- extendedWaitUntil:
    visible:
      id: "nav.home"
    timeout: 45000
- waitForAnimationToEnd:
    timeout: 3000

# ========== PHASE 2: HOME TAB (full inspection) ==========
- takeScreenshot: artifacts/qa_03a_home_top
- scroll
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: artifacts/qa_03b_home_mid
- scroll
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: artifacts/qa_03c_home_bottom

# ========== PHASE 3: CASES TAB ==========
- tapOn:
    id: "nav.cases"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: artifacts/qa_04a_cases_top
- scroll
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: artifacts/qa_04b_cases_scroll

# -- Open first case detail --
- scrollUntilVisible:
    element:
      id: "case-list-item"
    direction: DOWN
    timeout: 15000
- tapOn:
    id: "case-list-item"
    index: 0
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: artifacts/qa_05a_case_detail
- scroll
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: artifacts/qa_05b_case_detail_scroll
- scroll
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: artifacts/qa_05c_case_detail_bottom
- back
- waitForAnimationToEnd:
    timeout: 5000

# ========== PHASE 4: EXAMS TAB ==========
