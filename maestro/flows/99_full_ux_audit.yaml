appId: com.medasi.praticase
name: 99 full UX audit - every screen screenshot
tags:
  - audit
env:
  USERNAME: ${MAESTRO_USERNAME}
  PASSWORD: ${MAESTRO_PASSWORD}
---
# ========== 1. ONBOARDING ==========
- launchApp:
    clearState: true
    stopApp: true
- takeScreenshot: artifacts/audit_01_onboarding

# ========== 2. LOGIN ==========
- tapOn: "Giriş Yap"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: artifacts/audit_02_login

# ========== 3. PERFORM LOGIN ==========
- tapOn:
    text: "doktor@hastane.com"
- inputText: ${USERNAME}
- hideKeyboard
- tapOn:
    text: "••••••••"
- inputText: ${PASSWORD}
- hideKeyboard
- tapOn:
    id: "cta.login-submit"
- runFlow:
    when:
      visible:
        id: "cta.complete-profile"
    commands:
      - scrollUntilVisible:
          element:
            id: "cta.complete-profile"
          direction: DOWN
      - tapOn:
          id: "cta.complete-profile"
- extendedWaitUntil:
    visible:
      id: "nav.home"
    timeout: 45000

# ========== 4. HOME TAB ==========
- takeScreenshot: artifacts/audit_03_home
- scroll
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: artifacts/audit_03b_home_scrolled
- scroll
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: artifacts/audit_03c_home_bottom

# ========== 5. CASES TAB ==========
- tapOn:
    id: "nav.cases"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: artifacts/audit_04_cases
- scroll
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: artifacts/audit_04b_cases_scrolled

# ========== 6. CASE DETAIL ==========
- scrollUntilVisible:
    element:
      id: "case-list-item"
    direction: DOWN
    timeout: 15000
- scroll
- tapOn:
    id: "case-list-item"
    index: 0
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: artifacts/audit_05_case_detail
- scroll
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: artifacts/audit_05b_case_detail_scrolled
- back
- waitForAnimationToEnd:
    timeout: 5000

# ========== 7. EXAMS TAB ==========
- tapOn:
    id: "nav.exams"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: artifacts/audit_06_exams
- scroll
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: artifacts/audit_06b_exams_scrolled

# ========== 8. PROGRESS TAB ==========
- tapOn:
    id: "nav.progress"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: artifacts/audit_07_progress
- scroll
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: artifacts/audit_07b_progress_scrolled

# ========== 9. PROFILE TAB ==========
- tapOn:
    id: "nav.profile"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: artifacts/audit_08_profile
- scroll
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: artifacts/audit_08b_profile_scrolled

# ========== 10. CASE HISTORY (from profile) ==========
- scrollUntilVisible:
    element:
      id: "menu.case-history"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 60
- tapOn:
    id: "menu.case-history"
- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: artifacts/audit_09_case_history
- back
- waitForAnimationToEnd:
    timeout: 5000

# ========== 11. FAVORITES (from profile) ==========
- scrollUntilVisible:
    element:
      id: "menu.favorites"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 60
- tapOn:
    id: "menu.favorites"
- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: artifacts/audit_10_favorites
- back
- waitForAnimationToEnd:
    timeout: 5000

# ========== 12. SETTINGS ==========
- scrollUntilVisible:
    element:
      id: "menu.settings"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 60
- tapOn:
    id: "menu.settings"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: artifacts/audit_11_settings
- scroll
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: artifacts/audit_11b_settings_scrolled
- back
- waitForAnimationToEnd:
    timeout: 5000

# ========== 13. NOTIFICATIONS (from home) ==========
- tapOn:
    id: "nav.home"
- waitForAnimationToEnd:
    timeout: 5000
- runFlow:
    when:
      visible:
        id: "btn.notifications"
    commands:
      - tapOn:
          id: "btn.notifications"
      - waitForAnimationToEnd:
          timeout: 5000
      - takeScreenshot: artifacts/audit_12_notifications
      - back
      - waitForAnimationToEnd:
          timeout: 5000

# ========== 14. BADGES (from progress) ==========
- tapOn:
    id: "nav.progress"
- waitForAnimationToEnd:
    timeout: 5000
- runFlow:
    when:
      visible:
        id: "btn.badges"
    commands:
      - tapOn:
          id: "btn.badges"
      - waitForAnimationToEnd:
          timeout: 5000
      - takeScreenshot: artifacts/audit_13_badges
      - back
      - waitForAnimationToEnd:
          timeout: 5000

# ========== 15. LEADERBOARD (from progress) ==========
- runFlow:
    when:
      visible:
        id: "btn.leaderboard"
    commands:
      - tapOn:
          id: "btn.leaderboard"
      - waitForAnimationToEnd:
          timeout: 5000
      - takeScreenshot: artifacts/audit_14_leaderboard
      - back
      - waitForAnimationToEnd:
          timeout: 5000
