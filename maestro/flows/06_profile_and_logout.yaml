appId: com.medasi.praticase
name: 06 profile menu and logout flow
tags:
  - profile
  - auth
env:
  USERNAME: ${MAESTRO_USERNAME}
  PASSWORD: ${MAESTRO_PASSWORD}
---
- runFlow: ../shared/login.yaml

# --- Navigate to Profile tab ---
- tapOn:
    id: "nav.profile"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: artifacts/06a_profile

# --- Vaka Geçmişim ---
- scrollUntilVisible:
    element:
      id: "menu.case-history"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 60
- tapOn:
    id: "menu.case-history"
- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: artifacts/06b_case_history
- back
- waitForAnimationToEnd:
    timeout: 6000

- scrollUntilVisible:
    element:
      id: "menu.favorites"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 60
- tapOn:
    id: "menu.favorites"
- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: artifacts/06c_favorites
- back
- waitForAnimationToEnd:
    timeout: 6000

# --- Settings ---
- scrollUntilVisible:
    element:
      id: "menu.settings"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 60
- tapOn:
    id: "menu.settings"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: artifacts/06d_settings

# --- Logout ---
- scrollUntilVisible:
    element:
      id: "menu.logout"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 60
- tapOn:
    id: "menu.logout"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: artifacts/06e_logout_confirm
- tapOn:
    id: "cta.confirm-logout"
- waitForAnimationToEnd:
    timeout: 8000
- assertVisible: "Giriş Yap"
- takeScreenshot: artifacts/06f_after_logout
