appId: com.medasi.praticase
name: 06 profile menu and logout flow
tags:
  - profile
  - auth
env:
  USERNAME: ${MAESTRO_USERNAME}
  PASSWORD: ${MAESTRO_PASSWORD}
---
- runFlow: ../shared/login.yaml

# --- Navigate to Profile tab ---
- tapOn:
    id: "nav.profile"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: artifacts/06a_profile

# --- Scroll to menu items and verify they are tappable ---
- scrollUntilVisible:
    element:
      id: "menu.case-history"
    direction: DOWN
    timeout: 8000
- tapOn:
    id: "menu.case-history"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: artifacts/06b_case_history
- back
- waitForAnimationToEnd:
    timeout: 4000

# Scroll to find "Favori Vakalarım" after returning
- scrollUntilVisible:
    element:
      id: "menu.favorites"
    direction: DOWN
    timeout: 8000
- tapOn:
    id: "menu.favorites"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: artifacts/06c_favorites
- back
- waitForAnimationToEnd:
    timeout: 4000

# --- Navigate to Settings ---
- scrollUntilVisible:
    element:
      id: "menu.settings"
    direction: DOWN
    timeout: 8000
- tapOn:
    id: "menu.settings"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: artifacts/06d_settings

# --- Logout flow ---
- scrollUntilVisible:
    element:
      text: "Çıkış Yap"
    direction: DOWN
    timeout: 8000
- tapOn: "Çıkış Yap"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: artifacts/06e_logout_confirm
- tapOn: "Çıkış Yap"
- waitForAnimationToEnd:
    timeout: 8000
# After logout, should see login screen again
- assertVisible: "Giriş Yap"
- takeScreenshot: artifacts/06f_after_logout
