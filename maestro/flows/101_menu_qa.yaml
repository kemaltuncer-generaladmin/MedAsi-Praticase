appId: com.medasi.praticase
name: 101 profile menu items QA
tags:
  - qa
env:
  USERNAME: ${MAESTRO_USERNAME}
  PASSWORD: ${MAESTRO_PASSWORD}
---
# Fresh launch with login
- launchApp:
    clearState: true
    stopApp: true
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible: "Giriş Yap"
    timeout: 15000
- tapOn: "Giriş Yap"
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "doktor@hastane.com"
- inputText: ${USERNAME}
- hideKeyboard
- tapOn:
    text: "••••••••"
- inputText: ${PASSWORD}
- hideKeyboard
- tapOn:
    id: "cta.login-submit"
- runFlow:
    when:
      visible:
        id: "cta.complete-profile"
    commands:
      - scrollUntilVisible:
          element:
            id: "cta.complete-profile"
          direction: DOWN
      - tapOn:
          id: "cta.complete-profile"
- extendedWaitUntil:
    visible:
      id: "nav.home"
    timeout: 45000
- waitForAnimationToEnd:
    timeout: 3000

# Go to Profile tab (fresh, scroll at top)
- tapOn:
    id: "nav.profile"
- waitForAnimationToEnd:
    timeout: 5000

# -- 1. Vaka Geçmişim --
- scrollUntilVisible:
    element:
      id: "menu.case-history"
    direction: DOWN
    timeout: 15000
    visibilityPercentage: 50
    speed: 30
- tapOn:
    id: "menu.case-history"
- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: artifacts/qa_menu_01_case_history
- scroll
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: artifacts/qa_menu_01b_case_history_scroll
- back
- waitForAnimationToEnd:
    timeout: 5000

