<style>
        body {
            background-color: theme('colors.scaffold-bg');
            color: theme('colors.on-surface');
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle Wave Pattern for Header */
        .header-wave {
            background-image: url("data:image/svg+xml,%3Csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,50 C150,150 350,-50 500,50 L500,0 L0,0 Z' fill='rgba(0,97,94,0.03)'/%3E%3C/svg%3E");
            background-size: cover;
            background-position: center;
        }

        /* Ambient Shadow for Interactive Cards */
        .ambient-shadow {
            box-shadow: 0 8px 16px rgba(11, 29, 42, 0.04);
        }
    </style>
</head>
<body class="min-h-screen pb-[120px]">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-on-surface docked full-width top-0 border-b border-hairline-border dark:border-outline-variant flat no shadows transition-colors duration-200 flex justify-between items-center w-full px-margin-mobile py-sm sticky z-40 header-wave">
<div class="flex items-center gap-sm text-primary dark:text-teal-bright">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">timer</span>
</div>
<div class="font-headline-md text-headline-md text-primary dark:text-teal-bright text-center flex-1">Vaka: Akut Göğüs Ağŕısı</div>
<div class="font-body-sm text-body-sm text-muted-text dark:text-outline-variant">Adım: Anamnez</div>
</header>
<!-- Main Content Area -->
<main class="px-margin-mobile pt-lg flex flex-col gap-lg max-w-3xl mx-auto">
<!-- Section: Tanı (Diagnosis) -->
<section class="flex flex-col gap-sm">
<h2 class="font-headline-md text-headline-md text-on-surface mb-xs">Tanı ve Ayırıcı Tanı</h2>
<!-- Primary Diagnosis Card -->
<div class="bg-white border border-hairline-border rounded-xl p-md ambient-shadow flex flex-col gap-sm focus-within:border-primary focus-within:border-[1.5px] transition-all">
<label class="font-body-sm text-body-sm text-muted-text flex items-center gap-xs" for="primary-diagnosis"><span class="material-symbols-outlined text-[16px]">medical_information</span> Ön Tanı</label>
<textarea class="w-full bg-surface-bright border-none rounded-lg p-sm font-body-md text-body-md text-on-surface focus:ring-0 placeholder:text-outline-variant resize-none" id="primary-diagnosis" placeholder="Ön tanınızı buraya girin..." rows="2"></textarea>
</div>
<!-- Differential Diagnoses Card -->
<div class="bg-white border border-hairline-border rounded-xl p-md ambient-shadow flex flex-col gap-sm focus-within:border-primary focus-within:border-[1.5px] transition-all">
<label class="font-body-sm text-body-sm text-muted-text flex items-center gap-xs" for="differential-diagnosis"><span class="material-symbols-outlined text-[16px]">list_alt</span> Ayırıcı Tanılar</label>
<textarea class="w-full bg-surface-bright border-none rounded-lg p-sm font-body-md text-body-md text-on-surface focus:ring-0 placeholder:text-outline-variant resize-none" id="differential-diagnosis" placeholder="Olası diğer tanıları listeleyin..." rows="3"></textarea>
</div>
</section>
<!-- Section: Yönetim Planı (Management Plan) -->
<section class="flex flex-col gap-sm mt-md">
<h2 class="font-headline-md text-headline-md text-on-surface mb-xs">Yönetim Planı</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Medication -->
<div class="bg-white border border-hairline-border rounded-xl p-md ambient-shadow flex flex-col gap-sm focus-within:border-primary focus-within:border-[1.5px] transition-all">
<label class="font-body-sm text-body-sm text-muted-text flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]">pill</span>
                        İlaç Tedavisi
                    </label>
<textarea class="w-full bg-surface-bright border-none rounded-lg p-sm font-body-md text-body-md text-on-surface focus:ring-0 placeholder:text-outline-variant resize-none" placeholder="Reçete edilecek ilaçlar..." rows="2"></textarea>
</div>
<!-- Consultation -->
<div class="bg-white border border-hairline-border rounded-xl p-md ambient-shadow flex flex-col gap-sm focus-within:border-primary focus-within:border-[1.5px] transition-all">
<label class="font-body-sm text-body-sm text-muted-text flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]">groups</span>
                        Konsültasyon
                    </label>
<textarea class="w-full bg-surface-bright border-none rounded-lg p-sm font-body-md text-body-md text-on-surface focus:ring-0 placeholder:text-outline-variant resize-none" placeholder="Gerekli uzman görüşleri..." rows="2"></textarea>
</div>
<!-- Emergency Intervention -->
<div class="bg-white border border-hairline-border rounded-xl p-md ambient-shadow flex flex-col gap-sm focus-within:border-primary focus-within:border-[1.5px] transition-all md:col-span-2">
<label class="font-body-sm text-body-sm text-error-red flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]">emergency</span>
                        Acil Müdahale / Ek Tetkik
                    </label>
<textarea class="w-full bg-surface-bright border-none rounded-lg p-sm font-body-md text-body-md text-on-surface focus:ring-0 placeholder:text-outline-variant resize-none" placeholder="Yapılması gereken acil işlemler veya ek laboratuvar/görüntüleme talepleri..." rows="2"></textarea>
</div>
</div>
</section>
<!-- Finalize Action -->
<div class="mt-xl flex justify-center pb-xl">
<button class="h-[52px] bg-gradient-to-r from-gradient-start to-gradient-end text-white font-headline-md text-headline-md px-xl rounded-xl w-full md:w-auto min-w-[280px] shadow-lg hover:opacity-90 transition-opacity flex items-center justify-center gap-sm">Sınavı Bitir ve Değğerlendir <span class="material-symbols-outlined">check_circle</span></button>
</div>
</main>
<!-- BottomNavBar (Suppressed due to linear/task-focused intent of an exam screen, prioritizing content canvas) -->


</body></html>
