<!-- Simple JS for mockup interaction -->
<script>
        function setupSingleSelect(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const buttons = container.querySelectorAll('button');

            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    // Remove selected state from all
                    buttons.forEach(b => {
                        b.classList.remove('chip-selected');
                        b.classList.add('chip-unselected');
                    });
                    // Add to clicked
                    btn.classList.remove('chip-unselected');
                    btn.classList.add('chip-selected');
                });
            });
        }

        function setupMultiSelect(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const buttons = container.querySelectorAll('button');

            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const isSelected = btn.classList.contains('chip-selected');
                    if (isSelected) {
                        btn.classList.remove('chip-selected');
                        btn.classList.add('chip-unselected');
                        const icon = btn.querySelector('.material-symbols-outlined');
                        if(icon) icon.remove();
                    } else {
                        btn.classList.remove('chip-unselected');
                        btn.classList.add('chip-selected');
                        // Add check icon
                        if(!btn.querySelector('.material-symbols-outlined')) {
                            const icon = document.createElement('span');
                            icon.className = 'material-symbols-outlined text-[16px] mr-1';
                            icon.textContent = 'check';
                            btn.prepend(icon);
                        }
                    }
                });
            });
        }

        setupSingleSelect('exam-chips');
        setupSingleSelect('level-chips');
        setupMultiSelect('interest-chips');
    </script>
